<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Extractor RUT - Excel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        #drop-area { border: 2px dashed #007bff; padding: 40px; text-align: center; cursor: pointer; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>Extractor de RUT a Excel</h2>
    <p>Sube un archivo RUT (PDF) para generar la fila de exportación automática.</p>
    
    <div id="drop-area">
        <input type="file" id="file-input" accept="application/pdf" style="display:none">
        <p>Haz clic aquí o arrastra el PDF del RUT</p>
    </div>

    <div id="result-area" style="display:none">
        <h3>Vista Previa:</h3>
        <div style="overflow-x: auto;">
            <table id="preview-table"></table>
        </div>
        <button id="download-btn">Descargar Excel (.xlsx)</button>
    </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const fileInput = document.getElementById('file-input');
    const dropArea = document.getElementById('drop-area');
    let extractedData = [];

    dropArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) await processPDF(file);
    });

    async function processPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const page = await pdf.getPage(1); // REGLA: Solo página 1
        const textContent = await page.getTextContent();
        
        // Unimos el texto y aplicamos el corte en "Firma del solicitante"
        let fullText = textContent.items.map(item => item.str).join(" ");
        if (fullText.includes("Firma del solicitante")) {
            fullText = fullText.split("Firma del solicitante")[0];
        }

        const dataRow = Array(22).fill("");

        // 1. Tipo de Contribuyente (Col 11)
        const isJuridica = fullText.includes("Persona jurídica");
        dataRow[10] = isJuridica ? "Persona jurídica" : "Persona natural o sucesión ilíquida";

        // 2. NIT y DV (Col 10 y 22)
        const nitMatch = fullText.match(/5\.\s*Número de Identificación Tributaria\s*\(NIT\)\s*(\d+)/);
        const dvMatch = fullText.match(/6\.\s*DV\s*(\d)/);
        if (nitMatch) dataRow[9] = nitMatch[1];
        if (dvMatch) dataRow[21] = dvMatch[1];

        // 3. Nombre / Razón Social (Col 1)
        if (isJuridica) {
            const rsMatch = fullText.match(/35\.\s*Razón\s*social\s*(.*?)(?=36\.)/);
            dataRow[0] = rsMatch ? rsMatch[1].trim() : "";
        } else {
            // REGLA: Otros nombres + Primer nombre + Primer apellido + Segundo apellido
            const pApe = (fullText.match(/31\.\s*Primer\s*apellido\s*(.*?)(?=32\.)/) || ["",""])[1].trim();
            const sApe = (fullText.match(/32\.\s*Segundo\s*apellido\s*(.*?)(?=33\.)/) || ["",""])[1].trim();
            const pNom = (fullText.match(/33\.\s*Primer\s*nombre\s*(.*?)(?=34\.)/) || ["",""])[1].trim();
            const oNom = (fullText.match(/34\.\s*Otros\s*nombres\s*(.*?)(?=35\.)/) || ["",""])[1].trim();
            dataRow[0] = `${oNom} ${pNom} ${pApe} ${sApe}`.replace(/\s+/g, ' ').trim();
        }

        // 4. Ubicación
        dataRow[4] = (fullText.match(/41\.\s*Dirección\s*principal\s*(.*?)(?=42\.)/) || ["",""])[1].trim();
        dataRow[6] = (fullText.match(/40\.\s*Ciudad\/Municipio\s*\d*\s*(.*?)(?=41\.)/) || ["",""])[1].trim();
        dataRow[8] = (fullText.match(/42\.\s*Correo\s*electrónico\s*(.*?)(?=43\.)/) || ["",""])[1].trim();

        // 5. Actividad (Col 21) - Solo número
        const actMatch = fullText.match(/46\.\s*Código\s*(\d{4})/);
        if (actMatch) dataRow[20] = actMatch[1];

        extractedData = [dataRow];
        showPreview(dataRow);
    }

    function showPreview(row) {
        const table = document.getElementById('preview-table');
        table.innerHTML = `<tr>${row.map((d, i) => `<th>${i+1}</th>`).join('')}</tr>
                           <tr>${row.map(d => `<td>${d}</td>`).join('')}</tr>`;
        document.getElementById('result-area').style.display = 'block';
    }

    document.getElementById('download-btn').addEventListener('click', () => {
        const ws = XLSX.utils.aoa_to_sheet([Array.from({length: 22}, (_, i) => i + 1), extractedData[0]]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "RUT");
        XLSX.writeFile(wb, "RUT_Extraido.xlsx");
    });
</script>
</body>
</html>
