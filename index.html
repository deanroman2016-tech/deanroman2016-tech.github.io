<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Extractor RUT Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #drop-area { border: 2px dashed #0056b3; padding: 50px; text-align: center; cursor: pointer; background: #e9f2ff; transition: 0.3s; }
        #drop-area:hover { background: #d0e4ff; }
        button { background: #007bff; color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; min-width: 80px; }
        th { background: #f8f9fa; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Extractor de RUT con Anclaje Numérico</h2>
    <p>Este extractor utiliza los códigos de campo oficiales (5, 6, 35, 46, etc.) para mayor precisión.</p>
    
    <div id="drop-area">
        <input type="file" id="file-input" accept="application/pdf" style="display:none">
        <strong>Arrastra aquí el RUT o haz clic para buscar</strong>
    </div>

    <div id="result-area" style="display:none">
        <h3>Vista Previa de Exportación:</h3>
        <div class="table-wrapper">
            <table id="preview-table"></table>
        </div>
        <br>
        <button id="download-btn">Descargar Excel (.xlsx)</button>
    </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const fileInput = document.getElementById('file-input');
    const dropArea = document.getElementById('drop-area');
    let finalRow = [];

    dropArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) await processRUT(file);
    });

    async function processRUT(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const page = await pdf.getPage(1); // Solo Página 1
        const textContent = await page.getTextContent();
        
        // Extraemos texto con limpieza de espacios múltiples
        let rawLines = textContent.items.map(item => item.str);
        let text = rawLines.join(" ").replace(/\s+/g, ' ');

        // Punto de corte: Firma del solicitante
        if (text.includes("Firma del solicitante")) {
            text = text.split("Firma del solicitante")[0];
        }

        const row = Array(22).fill("");

        // LOGICA DE EXTRACCIÓN POR ANCLAS NUMÉRICAS
        
        // 11. Tipo de Contribuyente
        row[10] = text.includes("Persona jurídica") ? "Persona jurídica" : "Persona natural o sucesión ilíquida";

        // 10. NIT (Campo 5) y 22. DV (Campo 6)
        const nitMatch = text.match(/5\.\s*Número de Identificación Tributaria\s*\(NIT\)\s*([\d\s]+)/);
        const dvMatch = text.match(/6\.\s*DV\s*(\d)/);
        if (nitMatch) row[9] = nitMatch[1].replace(/\s/g, '');
        if (dvMatch) row[21] = dvMatch[1];

        // 1. Nombre o Razón Social
        if (row[10] === "Persona jurídica") {
            const rsMatch = text.match(/35\.\s*Razón\s*social\s*(.*?)(?=36\.)/);
            row[0] = rsMatch ? rsMatch[1].trim() : "";
        } else {
            // Lógica: Otros (34) + Primero (33) + Apellido1 (31) + Apellido2 (32)
            const pApe = extractField(text, "31");
            const sApe = extractField(text, "32");
            const pNom = extractField(text, "33");
            const oNom = extractField(text, "34");
            row[0] = `${oNom} ${pNom} ${pApe} ${sApe}`.trim();
        }

        // 5. Dirección (41), 7. Ciudad (40), 9. Correo (42)
        row[4] = extractField(text, "41");
        // Limpiar ciudad (eliminar el código numérico inicial)
        let ciudadRaw = extractField(text, "40");
        row[6] = ciudadRaw.replace(/^\d+\s*/, '').trim(); 
        row[8] = extractField(text, "42");

        // 21. Actividad Económica (Campo 46) - Solo 4 números
        const actMatch = text.match(/46\.\s*Código\s*(\d{4})/);
        if (actMatch) row[20] = actMatch[1];

        finalRow = row;
        renderTable(row);
    }

    function extractField(text, num) {
        const regex = new RegExp(`${num}\\.\\s*[^\\n]*?\\s([^0-9][^\\n]*?)(?=\\s\\d{2,3}\\.|$)`, 'i');
        // Intento 2: Buscar entre el número de campo y el siguiente número de campo
        const match = text.match(new RegExp(`${num}\\.\\s*.*?\\s(.*?)(?=\\s\\d+\\.|$)`));
        return match ? match[1].trim() : "";
    }

    function renderTable(row) {
        const table = document.getElementById('preview-table');
        let header = "<tr>" + row.map((_, i) => `<th>Col ${i+1}</th>`).join('') + "</tr>";
        let body = "<tr>" + row.map(d => `<td>${d || ''}</td>`).join('') + "</tr>";
        table.innerHTML = header + body;
        document.getElementById('result-area').style.display = 'block';
    }

    document.getElementById('download-btn').addEventListener('click', () => {
        const ws = XLSX.utils.aoa_to_sheet([Array.from({length: 22}, (_, i) => `Columna ${i+1}`), finalRow]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "RUT_DATA");
        XLSX.writeFile(wb, "Extraccion_RUT.xlsx");
    });
</script>
</body>
</html>
